<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - FastAPI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 Task Manager</h1>
        
        <!-- Auth Section -->
        <div id="authSection" class="card">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>
            
            <div id="loginTab" class="tab-content active">
                <h2>Welcome Back</h2>
                <input type="text" id="loginUsername" placeholder="Username">
                <input type="password" id="loginPassword" placeholder="Password">
                <button class="btn-primary" onclick="login()">Login</button>
            </div>
            
            <div id="registerTab" class="tab-content">
                <h2>Create Account</h2>
                <input type="text" id="regUsername" placeholder="Username">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Password">
                <button class="btn-primary" onclick="register()">Register</button>
            </div>
        </div>

        <!-- Tasks Section -->
        <div id="tasksSection" class="card" style="display: none;">
            <div class="tasks-header">
                <h2>My Tasks</h2>
                <button class="btn-danger" onclick="logout()">Logout</button>
            </div>
            
            <!-- Pagination Controls -->
            <div class="pagination-bar">
                <div class="per-page">
                    <label>Per page:</label>
                    <select id="limitSelect" onchange="changeLimit()">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                    </select>
                </div>
                <div class="page-nav">
                    <button id="prevBtn" onclick="prevPage()" disabled>← Previous</button>
                    <span id="pageInfo">Page 1 of 1</span>
                    <button id="nextBtn" onclick="nextPage()">Next →</button>
                </div>
            </div>
            
            <!-- Create Task Form -->
            <div class="create-task">
                <h3>➕ Create New Task</h3>
                <div class="task-form">
                    <input type="text" id="taskTitle" placeholder="Task title">
                    <textarea id="taskDesc" placeholder="Task description"></textarea>
                    <label>
                        <input type="checkbox" id="taskCompleted"> Completed
                    </label>
                    <button class="btn-success" onclick="createTask()">Create Task</button>
                </div>
            </div>
            
            <!-- Tasks List -->
            <div id="tasksList" class="tasks-list">
                <div class="loading">Loading tasks...</div>
            </div>
        </div>
    </div>
    
    <!-- Message Toast -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
